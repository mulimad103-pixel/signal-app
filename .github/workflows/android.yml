name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: uses: actions/upload-artifact@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install Buildozer
        run: |
          sudo apt update
          sudo apt install -y python3-pip zip unzip openjdk-17-jdk
          pip install buildozer
          pip install cython

      - name: Build APK
        run: |
          buildozer android debug

      - name: Checkout 
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
