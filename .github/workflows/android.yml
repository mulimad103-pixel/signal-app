name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        run: buildozer android debug
        env:
          BUILDOZER_ALLOW_ROOT: 1
