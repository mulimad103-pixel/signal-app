name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK using Docker
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/home/user/app \
          -w /home/user/app \
          kivy/buildozer \
          sh -c "yes | buildozer android debug"
